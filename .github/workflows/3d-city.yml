name: Generate 3D Contribution City

on:
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate 3D Contribution Skyline

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@v0.9.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: AtharvPat           # ← your GitHub username (case-sensitive)
          MAX_REPOS: 10
          SETTING_JSON: |
            {
              "githubUserName": "AtharvPat",
              "title": "Atharv's Commit City",
              "topLangType": "pie",
              "topLangForegroundColor": "#ffffff",
              "topLangBackgroundColor": "#0d1117",
              "backgroundColor": "#0d1117",
              "foregroundColor": "#00d9ff",
              "contributionColorArray": ["#0d1117", "#0e4429", "#006d32", "#26a641", "#39d353"],
              "type": "3D",
              "angle": 45
            }

      - name: Commit and push generated SVG
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-update 3D contribution city [skip ci]"
          git push
